<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#080808">
    <style>html,body{background-color:#080808;color:#f3f4f6}</style>
    <link rel="stylesheet" href="/src/style.css">
    <title>Entrar — GD3D Creative</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=gd3d-preto">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="site-chrome"></div>
    <main class="min-h-screen pt-[var(--header-offset,5rem)] pb-16">
        <div class="max-w-md mx-auto px-4 sm:px-6">
            <div class="mt-8 sm:mt-12 bg-slate-900/80 border border-slate-800 rounded-3xl p-6 sm:p-8">
                <span class="text-xs font-extrabold uppercase tracking-widest text-brand-500">Conta</span>
                <h1 class="text-2xl font-extrabold text-white mt-1">Entrar</h1>
                <p id="login-subtitle" class="text-slate-400 text-sm mt-2">Aceda com o email e palavra-passe da sua conta.</p>

                <form id="login-form" class="mt-6 space-y-4">
                    <div>
                        <label for="login-email" class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
                        <input id="login-email" name="email" type="email" required autocomplete="username"
                            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-white placeholder:text-slate-500 focus:border-brand-500 focus:outline-none" />
                    </div>
                    <div>
                        <label for="login-password" class="block text-sm font-medium text-slate-300 mb-1.5">Palavra-passe</label>
                        <input id="login-password" name="password" type="password" required autocomplete="current-password"
                            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-white placeholder:text-slate-500 focus:border-brand-500 focus:outline-none" />
                    </div>
                    <p id="login-error" class="hidden text-sm text-red-400"></p>
                    <button type="submit" class="w-full py-3 bg-brand-500 hover:bg-brand-400 text-brand-900 font-bold rounded-xl transition">
                        Entrar
                    </button>
                </form>

                <p class="text-xs text-slate-500 mt-6 leading-relaxed">
                    Contas de <strong class="text-slate-400">cliente</strong> identificam-te na loja.
                    Contas de <strong class="text-slate-400">administrador</strong> acedem às ferramentas técnicas internas.
                    Com Supabase ativo, os utilizadores são geridos no painel Supabase (Authentication).
                </p>
            </div>
        </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="/src/pages/login.js"></script>
</body>
</html>
