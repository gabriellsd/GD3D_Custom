<!DOCTYPE html>
<html lang="pt">
<head>

    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#080808">
    <style>html,body{background-color:#0a0a0a;color:#f3f4f6}</style>
    <link rel="stylesheet" href="/src/style.css">
